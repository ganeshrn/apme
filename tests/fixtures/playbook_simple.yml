---
- name: Simple test playbook
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Print hello
      ansible.builtin.debug:
        msg: Hello World

    - name: Run shell command
      ansible.builtin.shell:
        cmd: echo "test"
      register: shell_result

    - name: Include role
      ansible.builtin.include_role:
        name: test_role
