[tox]
requires = tox-uv
env_list = lint, unit, integration, ai, ui

# ── Quality gates ────────────────────────────────────────────────────

[testenv:lint]
description = Run prek (ruff, mypy, pydoclint, uv-lock)
skip_install = true
allowlist_externals = prek
commands = prek run --all-files {posargs}

# ── Test suites ──────────────────────────────────────────────────────

[testenv:unit]
description = Unit tests with coverage (parallel via pytest-xdist)
extras = dev, gateway
commands =
    pytest -n auto --dist loadfile --cov=src/apme_engine --cov-report=term-missing --cov-fail-under=36 {posargs}

[testenv:integration]
description = Integration tests (requires OPA binary on PATH)
extras = dev, gateway
commands =
    pytest -m integration tests/integration/test_daemon_pipeline.py -v --tb=long {posargs}
pass_env = OPA_USE_PODMAN

[testenv:ai]
description = AI extra tests (abbenay)
extras = dev, ai
commands =
    python -c "import abbenay_grpc; print(abbenay_grpc.__name__)"
    pytest tests/test_ai_escalation.py -v --tb=short {posargs}

[testenv:ui]
description = Playwright UI tests (requires running gateway + UI)
extras = dev, gateway
commands =
    pytest -m ui tests/test_ui_playwright.py -v --tb=long {posargs}
pass_env =
    APME_UI_URL
    APME_DB_PATH
    APME_GATEWAY_*

# ── Code generation ──────────────────────────────────────────────────

[testenv:grpc]
description = Regenerate gRPC stubs from proto files
skip_install = true
allowlist_externals = bash
commands = bash scripts/gen_grpc.sh

# ── Developer tools ──────────────────────────────────────────────────

[testenv:graph]
description = Generate interactive ContentGraph HTML visualization
extras = dev
commands = python tools/visualize_graph.py {posargs}

# ── Pod lifecycle ────────────────────────────────────────────────────

[testenv:build]
description = Build all container images (podman)
skip_install = true
allowlist_externals = bash
commands = bash containers/podman/build.sh {posargs}

[testenv:up]
description = Build images and start the APME pod
skip_install = true
allowlist_externals = bash
commands =
    bash containers/podman/build.sh {posargs}
    bash containers/podman/up.sh

[testenv:down]
description = Stop the APME pod
skip_install = true
allowlist_externals = bash
commands = bash containers/podman/down.sh

[testenv:wipe]
description = Stop the APME pod and delete DB + session cache
skip_install = true
allowlist_externals = bash
commands = bash containers/podman/down.sh --wipe

[testenv:build-clean]
description = Wipe state and rebuild all images from scratch
skip_install = true
allowlist_externals = bash
commands =
    bash containers/podman/down.sh --wipe
    bash containers/podman/build.sh --no-cache

[testenv:up-clean]
description = Wipe state, rebuild from scratch, and start
skip_install = true
allowlist_externals = bash
commands =
    bash containers/podman/down.sh --wipe
    bash containers/podman/build.sh --no-cache
    bash containers/podman/up.sh

[testenv:cli]
description = Run CLI in the pod (pass args via posargs)
skip_install = true
allowlist_externals = bash
commands = bash containers/podman/run-cli.sh {posargs}

# ── Product demo ─────────────────────────────────────────────────────

[testenv:pm]
description = Build, start, and open the UI (for product managers)
skip_install = true
allowlist_externals = bash, python
commands =
    bash containers/podman/build.sh
    bash containers/podman/up.sh
    bash containers/podman/wait-for-pod.sh --health-check
    python -m webbrowser http://localhost:8081
