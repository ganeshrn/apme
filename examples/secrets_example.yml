---
# Example with secret patterns that trigger SEC (gitleaks) rules.
# ALL credentials below are FAKE — they use the right format so the
# gitleaks validator actually detects them.
#
# SEC:aws-access-token, SEC:generic-api-key, SEC:github-pat, SEC:private-key

- name: Secrets detection example
  hosts: localhost
  vars:
    # SEC:aws-access-token — must start with AKIA, 20 chars
    # (do NOT end with "EXAMPLE" — gitleaks allowlists that suffix)
    aws_access_key_id: "AKIA1234567890ABCDEF"

    # SEC:generic-api-key — password-like variable names
    db_password: "SuperSecretPassword123!"
    admin_password: "admin123"

    # SEC:github-pat — ghp_ + 36 alphanumeric characters
    github_token: "ghp_ABCDEFGHIJKLMNOPQRSTUVWXYZabcdef12"

    # SEC:private-key — PEM header/footer triggers detection
    ssh_private_key: |
      -----BEGIN RSA PRIVATE KEY-----
      FAKEKEYFAKEKEYFAKEKEYFAKEKEYFAKEKEYFAKEKEY
      not-a-real-key-for-demo-purposes-only==
      -----END RSA PRIVATE KEY-----

  tasks:
    - name: Use AWS credentials
      ansible.builtin.debug:
        msg: "Key is {{ aws_access_key_id }}"
      # no_log should be true for sensitive data

    - name: Connect to database
      ansible.builtin.debug:
        msg: "Connecting with password"
      # Password exposed in plain text

    - name: Show API key
      ansible.builtin.debug:
        msg: "Token: {{ github_token }}"
