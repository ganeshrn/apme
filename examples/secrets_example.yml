---
# Example with potential secret patterns (for testing SEC rules)
# These are FAKE credentials for testing only

- name: Secrets detection example
  hosts: localhost
  vars:
    # These trigger SEC rules - obviously fake values for demo
    aws_access_key: EXAMPLE_AWS_ACCESS_KEY_ID
    aws_secret_key: EXAMPLE_AWS_SECRET_KEY_FOR_DEMO

    # API keys (obviously fake patterns for demo)
    api_key: EXAMPLE_API_KEY_DO_NOT_USE_12345
    github_token: EXAMPLE_GH_TOKEN_FOR_DEMO_ONLY

    # Database credentials (fake)
    db_password: SuperSecretPassword123!

    # Generic password in var name
    admin_password: "admin123"

    # Private key pattern (example header only)
    ssh_private_key: |
      EXAMPLE_PRIVATE_KEY_HEADER_FOR_DEMO
      This is not a real key - demo purposes only
      EXAMPLE_PRIVATE_KEY_FOOTER_FOR_DEMO

  tasks:
    - name: Use AWS credentials
      ansible.builtin.debug:
        msg: "Key is {{ aws_access_key }}"
      # no_log should be true for sensitive data

    - name: Connect to database
      ansible.builtin.debug:
        msg: "Connecting with password"
      # Password exposed in plain text

    - name: Show API key
      ansible.builtin.debug:
        msg: "API: {{ api_key }}"
      # L047: Should use no_log for password-like params
