---
name: test

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  FORCE_COLOR: 1
  PY_COLORS: 1

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82 # v7
      - run: uv sync --extra dev
      - run: uv run pytest --cov=src/apme_engine --cov-report=term-missing --cov-fail-under=95
      - name: Fail if git reports dirty
        run: |
          if [[ -n $(git status -s) ]]; then
            echo "::error::Git reports modified/untracked files after test run"
            git status -s
            exit 1
          fi
