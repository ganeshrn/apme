---
name: deprecation-scrape

on:
  schedule:
    # 1st of every month at 08:00 UTC
    - cron: "0 8 1 * *"
  workflow_dispatch:
    inputs:
      min_version:
        description: "Minimum ansible-core version to include (e.g. 2.21)"
        required: false
        default: "2.21"
      dry_run:
        description: "Dry run (no PR created)"
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

env:
  FORCE_COLOR: 1
  PY_COLORS: 1

jobs:
  scrape-and-generate:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82 # v7

      - run: uv sync --extra dev

      - name: Scrape ansible-core deprecations
        run: >
          uv run python scripts/scrape_ansible_deprecations.py
          --audience content
          --min-version ${{ inputs.min_version || '2.21' }}

      - name: Generate new rule scaffolds
        id: generate
        run: |
          uv run python scripts/generate_deprecation_rules.py 2>&1 | tee /tmp/gen-output.txt
          NEW_COUNT=$(grep -c "Created:" /tmp/gen-output.txt || echo "0")
          echo "new_rules=$NEW_COUNT" >> "$GITHUB_OUTPUT"

          # Collect list of new rule IDs for the PR body
          RULE_IDS=$(grep "Created:" /tmp/gen-output.txt | grep -oP 'M\d+' | sort -u | tr '\n' ',' | sed 's/,$//')
          echo "rule_ids=$RULE_IDS" >> "$GITHUB_OUTPUT"

      - name: Check for changes
        id: changes
        run: |
          if [[ -n $(git status -s) ]]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected:"
            git status -s
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected."
          fi

      - name: Update rule catalog
        if: steps.changes.outputs.has_changes == 'true'
        run: uv run python scripts/generate_rule_catalog.py

      - name: Create pull request
        if: >
          steps.changes.outputs.has_changes == 'true'
          && (inputs.dry_run != true && inputs.dry_run != 'true')
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            feat(rules): add deprecation rules from ansible-core devel scrape

            Auto-generated M-rules from monthly ansible-core deprecation scan.
            Rules: ${{ steps.generate.outputs.rule_ids }}
          branch: automation/deprecation-rules-update
          delete-branch: true
          title: "feat(rules): new ansible-core deprecation rules detected"
          body: |
            ## Automated Deprecation Scrape

            The monthly ansible-core devel scrape found new deprecation patterns
            that don't have corresponding APME rules yet.

            ### New Rules
            ${{ steps.generate.outputs.rule_ids }}

            ### What to review
            - [ ] OPA Rego detection logic is correct
            - [ ] Native Python detection logic is correct
            - [ ] Test cases cover positive and negative cases
            - [ ] Rule documentation is accurate
            - [ ] No false positives with existing rule coverage

            ### Source
            - Scraped from: `ansible/ansible` `devel` branch
            - Pipeline: `scripts/deprecation_pipeline.sh`

            ---
            *This PR was auto-generated by the deprecation-scrape workflow.*
          labels: |
            automation
            rules
            modernization
