{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "apme.fullname" . }}-engine
  labels:
    {{- include "apme.labels" . | nindent 4 }}
    app.kubernetes.io/component: engine
spec:
  podSelector:
    matchLabels:
      {{- include "apme.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: engine
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "apme.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: gateway
      ports:
        - port: 50051
          protocol: TCP
        - port: 50058
          protocol: TCP
        - port: 50059
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "apme.fullname" . }}-gateway
  labels:
    {{- include "apme.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  podSelector:
    matchLabels:
      {{- include "apme.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: gateway
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "apme.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: engine
      ports:
        - port: 50060
          protocol: TCP
    - from:
        - podSelector:
            matchLabels:
              {{- include "apme.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: ui
      ports:
        - port: 8080
          protocol: TCP
    - ports:
        - port: 8080
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "apme.fullname" . }}-ui
  labels:
    {{- include "apme.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  podSelector:
    matchLabels:
      {{- include "apme.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ui
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 8081
          protocol: TCP
{{- end }}
